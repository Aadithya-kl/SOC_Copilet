version: '3.8'

services:
  backend:
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - APP_ENV=development
      - OFFLINE_MODE=false
      - CLAMAV_ENABLED=false

  worker:
    volumes:
      - ./backend:/app
    command: ["python", "-m", "app.agents.worker"] # Or wrap in watchfiles for hot-reload
    environment:
      - APP_ENV=development
      - OFFLINE_MODE=false
      - CLAMAV_ENABLED=false
