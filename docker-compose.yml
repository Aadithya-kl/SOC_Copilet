version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8001:8000"
    environment:
      - APP_ENV=production
    env_file:
      - path: .env
        required: false
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    networks:
      - soc_network

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      - APP_ENV=production
    env_file:
      - path: .env
        required: false
    depends_on:
      - backend
      - postgres
      - redis
      - qdrant
      - minio
      - ollama
    networks:
      - soc_network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: soc_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - soc_network

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - soc_network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - soc_network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - soc_network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - soc_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - soc_network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  ollama_models:

networks:
  soc_network:
